<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="fg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="3" y="3" width="42" height="42" rx="9" fill="url(#fg)"/>
  <!-- Grid: cross lines (thicker for favicon legibility) -->
  <line x1="14" y1="24" x2="34" y2="24" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="24" y1="14" x2="24" y2="34" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Grid: diagonal lines -->
  <line x1="16" y1="16" x2="32" y2="32" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <line x1="32" y1="16" x2="16" y2="32" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <!-- 4 corner nodes -->
  <circle cx="16" cy="16" r="2.8" fill="white"/>
  <circle cx="32" cy="16" r="2.8" fill="white"/>
  <circle cx="16" cy="32" r="2.8" fill="white"/>
  <circle cx="32" cy="32" r="2.8" fill="white"/>
  <!-- Center dot -->
  <circle cx="24" cy="24" r="2" fill="white"/>
</svg>